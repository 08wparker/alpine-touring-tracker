<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky background -->
  <rect width="120" height="65" fill="#E0F7FA"/>
  
  <!-- Ortler (main peak) -->
  <polygon points="60,15 40,55 80,55" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="1"/>
  
  <!-- König Spitze (left peak) -->
  <polygon points="35,20 20,50 50,50" fill="#F5F5F5" stroke="#B0BEC5" stroke-width="1"/>
  
  <!-- Eastern peaks (right) -->
  <polygon points="85,25 100,55 70,55" fill="#EEEEEE" stroke="#B0BEC5" stroke-width="1"/>
  
  <!-- Glacier flows -->
  <polygon points="40,55 60,15 80,55 75,75 45,75" fill="#FAFAFA" stroke="#CFD8DC" stroke-width="1"/>
  
  <!-- Rock faces and seracs -->
  <polygon points="50,35 60,15 60,25" fill="#90A4AE"/>
  <polygon points="60,25 70,35 60,15" fill="#78909C"/>
  
  <!-- Valley floor -->
  <rect y="75" width="120" height="25" fill="#4CAF50"/>
  
  <!-- Sulden village -->
  <rect x="10" y="85" width="8" height="6" fill="#8D6E63"/>
  <rect x="20" y="87" width="6" height="4" fill="#8D6E63"/>
  <rect x="28" y="86" width="7" height="5" fill="#8D6E63"/>
  
  <!-- Alpine roads -->
  <path d="M 5 95 Q 30 90 60 92 Q 90 94 115 90" stroke="#616161" stroke-width="2" fill="none"/>
  
  <!-- Labels -->
  <text x="60" y="110" text-anchor="middle" font-size="8" fill="#424242">Ortler Group</text>
  <text x="15" y="105" text-anchor="start" font-size="6" fill="#424242">Sulden</text>
</svg>